name: stuko_plonk
description: "Stuko Plonk - your local AI, in your pocket."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Persistence
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0

  # Filesystem & dialogs
  file_picker: ^8.1.6
  shared_preferences: ^2.3.3

  # HTTP
  dio: ^5.7.1

  # Background work
  workmanager: ^0.5.2

  # Permissions
  permission_handler: ^11.3.1

  # Speech (TTS / STT) - later phases
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # Misc
  intl: ^0.20.1
  collection: ^1.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.21.2
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
